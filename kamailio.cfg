#!KAMAILIO

#!define WEBHOOK_URL "https://4650-95-75-247-129.ngrok-free.app/clinic-lookup"
#!define DEFAULT_CLINIC_ID "LOCAL_TEST_ID"
#!define DEFAULT_CLINIC_NAME "LOCAL_TEST"
#!define UPSTREAM_HOSTPORT "f91ddb17-dbcc-463f-b260-96ee769d96c7.sip.vapi.ai"
#!define UPSTREAM_TRANSPORT "tcp"
debug=2
log_stderror=yes

listen=tcp:0.0.0.0:50873

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "pv.so"
loadmodule "tls.so"
loadmodule "http_client.so"
loadmodule "jansson.so"
loadmodule "xlog.so"

modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 60)
modparam("pike", "remove_latency", 8)
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

request_route {
    xlog("L_INFO", "REQ proto=$proto method=$rm src=$si:$sp ruri=$ru callid=$ci\n");

    # TCP-only SIP edge.
    if ($proto != "tcp") {
        xlog("L_WARN", "BLOCKED_PROTO callid=$ci src=$si:$sp proto=$proto\n");
        sl_send_reply("403", "TCP Only");
        exit;
    }

    # Temporary ban list for abusive sources.
    if ($sht(ipban=>$si) != $null) {
        xlog("L_WARN", "BLOCKED_BANNED_IP callid=$ci src=$si:$sp method=$rm\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Rate-limit SIP scanners and ban for 1 hour.
    if (!pike_check_req()) {
        xlog("L_WARN", "BLOCKED_PIKE callid=$ci src=$si:$sp method=$rm\n");
        $sht(ipban=>$si) = 1;
        sl_send_reply("403", "Forbidden");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    if (!is_method("INVITE")) {
        sl_send_reply("405","Method Not Allowed");
        exit;
    }

    # Debug headers from DIDWW to locate the real called DID number
    xlog("L_INFO", "HDR proto=$proto callid=$ci from=[$fu] to=[$tu] ruri=[$ru] fU=[$fU] tU=[$tU] rU=[$rU]\n");
    xlog("L_INFO", "HDR proto=$proto callid=$ci h_To=[$hdr(To)] h_P-Called-Party-ID=[$hdr(P-Called-Party-ID)] h_Diversion=[$hdr(Diversion)] h_RPID=[$hdr(Remote-Party-ID)] h_PAI=[$hdr(P-Asserted-Identity)]\n");

    # route(CLINIC_ENRICH);

    # Numero chiamato dalla richiesta in ingresso (Request-URI user part)
    $var(appstream_number_raw) = $rU;
    if ($var(appstream_number_raw) == "") {
        sl_send_reply("400","Missing destination number");
        exit;
    }

    # Normalize to E.164 for Vapi:
    # - keep +<digits>
    # - convert 00<digits> -> +<digits>
    # - convert <digits> -> +<digits>
    $var(appstream_number) = $var(appstream_number_raw);
    if ($var(appstream_number) =~ "^00[0-9]+$") {
        $var(appstream_number) = $(var(appstream_number){re.subst,/^00([0-9]+)$/+\1/});
    } else if ($var(appstream_number) =~ "^[0-9]+$") {
        $var(appstream_number) = "+" + $var(appstream_number);
    }

    if (!($var(appstream_number) =~ "^\\+[1-9][0-9]{6,14}$")) {
        xlog("L_WARN", "E164_NORMALIZE_FAILED callid=$ci raw=[$var(appstream_number_raw)] normalized=[$var(appstream_number)]\n");
        sl_send_reply("484", "Address Incomplete");
        exit;
    } else {
        xlog("L_INFO", "E164_NORMALIZED callid=$ci raw=[$var(appstream_number_raw)] normalized=[$var(appstream_number)]\n");
    }

    $ru = "sip:" + $var(appstream_number) + "@" + UPSTREAM_HOSTPORT + ";transport=" + UPSTREAM_TRANSPORT;
    xlog("L_INFO", "VAPI_TARGET_URI callid=$ci uri=$ru\n");
    append_hf("X-CALL-ID: $ci\r\n");
    append_hf("X-CALLER-ID: $fU\r\n");
    xlog("L_INFO", "RELAY in_proto=$proto out_transport=tcp callid=$ci dst=$ru\n");

    t_on_reply("REPLY_LOG");

    if(!t_relay()) {
        sl_send_reply("500","Relay Failed");
    }
    exit;
}

onreply_route[REPLY_LOG] {
    xlog("L_INFO", "REPLY proto=$proto code=$rs reason=$rr callid=$ci src=$si:$sp\n");
}

route[CLINIC_ENRICH] {
    $var(clinic_id) = DEFAULT_CLINIC_ID;
    $var(clinic_name) = DEFAULT_CLINIC_NAME;

    $var(payload) = "{}";
    jansson_set("string", "clinic_id", "$var(clinic_id)", "$var(payload)");
    jansson_set("string", "clinic_name", "$var(clinic_name)", "$var(payload)");
    jansson_set("string", "call_id", "$ci", "$var(payload)");
    jansson_set("string", "from_user", "$fU", "$var(payload)");
    jansson_set("string", "to_user", "$rU", "$var(payload)");
    xlog("L_INFO", "WEBHOOK_REQUEST callid=$ci payload=$var(payload)\n");

    $var(webhook_body) = "";
    $var(http_rc) = http_client_query(WEBHOOK_URL, "$var(payload)", "Content-Type: application/json", "$var(webhook_body)");
    xlog("L_INFO", "WEBHOOK_RESPONSE callid=$ci http=$var(http_rc) body=$var(webhook_body)\n");

    if ($var(http_rc) >= 200 && $var(http_rc) < 300 && $var(webhook_body) != "") {
        $var(api_clinic_id) = "";
        $var(api_clinic_name) = "";

        if (jansson_get("clinic_id", "$var(webhook_body)", "$var(api_clinic_id)") && $var(api_clinic_id) != "") {
            $var(clinic_id) = $var(api_clinic_id);
        }

        if (jansson_get("clinic_name", "$var(webhook_body)", "$var(api_clinic_name)") && $var(api_clinic_name) != "") {
            $var(clinic_name) = $var(api_clinic_name);
        }
    }

    append_hf("X-clinic-id: $var(clinic_id)\r\n");
    append_hf("X-clinic-name: $var(clinic_name)\r\n");
}
