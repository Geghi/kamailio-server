#!KAMAILIO

#!define WEBHOOK_URL "https://4650-95-75-247-129.ngrok-free.app/clinic-lookup"
#!define DEFAULT_CLINIC_ID "LOCAL_TEST_ID"
#!define DEFAULT_CLINIC_NAME "LOCAL_TEST"
#!define UPSTREAM_HOSTPORT "51ae0262-b5fd-4eb0-92fe-04b4ad2c7831.sip.vapi.ai"
#!define UPSTREAM_TRANSPORT "tcp"

# Basic runtime logs (higher debug = more logs)
debug=2
log_stderror=yes

# Kamailio listens on all interfaces inside the container, but must advertise
# the public SIP socket so in-dialog requests (BYE/ACK/re-INVITE) route back.
listen=tcp:0.0.0.0:50873 advertise 46.225.134.102:50873

# Modules = built-in features Kamailio will use.
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "auth.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "pv.so"
loadmodule "tls.so"
loadmodule "http_client.so"
loadmodule "jansson.so"
loadmodule "xlog.so"

modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 60)
modparam("pike", "remove_latency", 8)
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

# Main call flow: every incoming SIP request starts here.
request_route {
    # STEP 1: Read auth settings from environment variables.
    # These are optional and can be turned on/off without editing this file.
    # Auth settings from environment (no hardcoded secrets in config).
    $var(auth_enabled) = $env(DIDWW_AUTH_ENABLED);
    if ($var(auth_enabled) == $null || $var(auth_enabled) == "") $var(auth_enabled) = "0";
    $var(auth_realm) = $env(DIDWW_AUTH_REALM);
    if ($var(auth_realm) == $null || $var(auth_realm) == "") $var(auth_realm) = "46.225.134.102";
    $var(auth_user) = $env(DIDWW_AUTH_USER);
    $var(auth_pass) = $env(DIDWW_AUTH_PASS);

    xlog("L_INFO", "REQ proto=$proto method=$rm src=$si:$sp ruri=$ru callid=$ci\n");
    xlog("L_INFO", "REQ_HDR callid=$ci method=$rm ftag=[$ft] ttag=[$tt] h_Route=[$hdr(Route)] h_Record-Route=[$hdr(Record-Route)] h_Contact=[$hdr(Contact)]\n");

    # STEP 2: Detect if this request comes from Vapi.
    # Identify requests coming from Vapi by From-domain suffix.
    $var(is_from_vapi) = "0";
    if ($fd =~ "sip\\.vapi\\.ai$") {
        $var(is_from_vapi) = "1";
    }
    # Debug helper: show Vapi detection decision for every INVITE.
    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE_ORIGIN callid=$ci src=$si:$sp from_domain=[$fd] is_from_vapi=[$var(is_from_vapi)] from=[$fu] to=[$tu] ruri=[$ru]\n");
    }

    # STEP 3: Safety checks (protocol + temporary blocks + rate limit).
    # TCP-only SIP edge.
    if ($proto != "tcp") {
        xlog("L_WARN", "BLOCKED_PROTO callid=$ci src=$si:$sp proto=$proto\n");
        sl_send_reply("403", "TCP Only");
        exit;
    }

    # Temporary ban list for abusive sources.
    if ($sht(ipban=>$si) != $null) {
        xlog("L_WARN", "BLOCKED_BANNED_IP callid=$ci src=$si:$sp method=$rm\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Rate-limit SIP scanners and ban for 1 hour.
    if (!pike_check_req()) {
        xlog("L_WARN", "BLOCKED_PIKE callid=$ci src=$si:$sp method=$rm\n");
        $sht(ipban=>$si) = 1;
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # STEP 4: Fast response for OPTIONS ("are you alive?" health check).
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # STEP 5: Optional auth challenge for new incoming INVITE from provider side.
    if ($var(auth_enabled) == "1" && !has_totag() && is_method("INVITE") && $var(is_from_vapi) != "1") {
        route(DIDWW_AUTH);
    }

    # STEP 6: If call is already established, keep forwarding in-dialog messages.
    # Examples: BYE (hangup), ACK, re-INVITE.
    # Handle in-dialog requests (BYE/ACK/re-INVITE/etc.) using Route set.
    if (has_totag()) {
        if (loose_route()) {
            xlog("L_INFO", "IN_DIALOG_RELAY proto=$proto method=$rm callid=$ci dst=$ru\n");
            xlog("L_INFO", "IN_DIALOG_HEADERS callid=$ci method=$rm route=[$hdr(Route)] contact=[$hdr(Contact)] to=[$hdr(To)] from=[$hdr(From)]\n");
            if (is_method("REFER")) {
                xlog("L_INFO", "REFER_DETAILS callid=$ci refer_to=[$hdr(Refer-To)] referred_by=[$hdr(Referred-By)] replaces=[$hdr(Replaces)] target_dialog_ruri=[$ru]\n");
            }
            if (!t_relay()) {
                sl_send_reply("500", "Relay Failed");
            }
            exit;
        }
        xlog("L_WARN", "IN_DIALOG_NO_ROUTE callid=$ci method=$rm ruri=[$ru] route=[$hdr(Route)] to=[$hdr(To)] from=[$hdr(From)]\n");

        # Some upstreams send in-dialog BYE without Route set.
        # In that case, relay based on Request-URI to avoid stuck calls.
        if (is_method("BYE")) {
            xlog("L_INFO", "IN_DIALOG_FALLBACK_RELAY callid=$ci method=$rm dst=$ru\n");
            if (!t_relay()) {
                sl_send_reply("500", "Relay Failed");
            }
            exit;
        }

        # ACK for negative replies can be stateful without Route header.
        if (is_method("ACK") && t_check_trans()) {
            if (!t_relay()) {
                sl_send_reply("500", "Relay Failed");
            }
            exit;
        }

        sl_send_reply("404", "Not here");
        exit;
    }

    # STEP 7: Forward CANCEL if there is an existing transaction.
    # Relay CANCEL on existing transaction.
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            if (!t_relay()) {
                sl_send_reply("500", "Relay Failed");
            }
        }
        exit;
    }

    # STEP 8: Loop protection (stop requests that bounced too many times).
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    # STEP 9: This edge only accepts INVITE for new dialogs.
    if (!is_method("INVITE")) {
        sl_send_reply("405","Method Not Allowed");
        exit;
    }

    # STEP 10: If call comes from Vapi, pass it through as-is.
    # For Vapi-originated handoff calls, keep destination untouched and relay as-is.
    if ($var(is_from_vapi) == "1") {
        xlog("L_INFO", "VAPI_HANDOFF_INBOUND callid=$ci from_domain=[$fd] src=$si:$sp dst=$ru\n");
        xlog("L_INFO", "VAPI_HANDOFF_HEADERS callid=$ci to=[$hdr(To)] from=[$hdr(From)] contact=[$hdr(Contact)] refer_to=[$hdr(Refer-To)] referred_by=[$hdr(Referred-By)]\n");
        append_hf("X-CALL-ID: $ci\r\n");
        append_hf("X-CALLER-ID: $fU\r\n");
        record_route();
        t_on_reply("REPLY_LOG");
        if (!t_relay()) {
            sl_send_reply("500", "Relay Failed");
        }
        exit;
    }

    # STEP 11: For non-Vapi inbound calls, log headers for troubleshooting.
    # Debug headers from DIDWW to locate the real called DID number
    xlog("L_INFO", "HDR proto=$proto callid=$ci from=[$fu] to=[$tu] ruri=[$ru] fU=[$fU] tU=[$tU] rU=[$rU]\n");
    xlog("L_INFO", "HDR proto=$proto callid=$ci h_To=[$hdr(To)] h_P-Called-Party-ID=[$hdr(P-Called-Party-ID)] h_Diversion=[$hdr(Diversion)] h_RPID=[$hdr(Remote-Party-ID)] h_PAI=[$hdr(P-Asserted-Identity)]\n");

    # Optional webhook enrichment step (currently disabled).
    # route(CLINIC_ENRICH);

    # STEP 12: Read destination number from Request-URI.
    # Numero chiamato dalla richiesta in ingresso (Request-URI user part)
    $var(appstream_number_raw) = $rU;
    if ($var(appstream_number_raw) == "") {
        sl_send_reply("400","Missing destination number");
        exit;
    }

    # STEP 13: Normalize number into E.164 format (+countrycode...).
    # Normalize to E.164 for Vapi:
    # - keep +<digits>
    # - convert 00<digits> -> +<digits>
    # - convert <digits> -> +<digits>
    $var(appstream_number) = $var(appstream_number_raw);
    if ($var(appstream_number) =~ "^00[0-9]+$") {
        $var(appstream_number) = $(var(appstream_number){re.subst,/^00([0-9]+)$/+\1/});
    } else if ($var(appstream_number) =~ "^[0-9]+$") {
        $var(appstream_number) = "+" + $var(appstream_number);
    }

    if (!($var(appstream_number) =~ "^\\+[1-9][0-9]{6,14}$")) {
        xlog("L_WARN", "E164_NORMALIZE_FAILED callid=$ci raw=[$var(appstream_number_raw)] normalized=[$var(appstream_number)]\n");
        sl_send_reply("484", "Address Incomplete");
        exit;
    } else {
        xlog("L_INFO", "E164_NORMALIZED callid=$ci raw=[$var(appstream_number_raw)] normalized=[$var(appstream_number)]\n");
    }

    # STEP 14: Build target SIP URI pointing to Vapi upstream.
    $ru = "sip:" + $var(appstream_number) + "@" + UPSTREAM_HOSTPORT + ";transport=" + UPSTREAM_TRANSPORT;
    xlog("L_INFO", "VAPI_TARGET_URI callid=$ci uri=$ru\n");
    xlog("L_INFO", "INVITE_PRE_RELAY callid=$ci from=[$fu] to=[$tu] ruri=[$ru] contact=[$hdr(Contact)]\n");

    # STEP 15: Add custom headers that downstream can use.
    append_hf("X-CALL-ID: $ci\r\n");
    append_hf("X-CALLER-ID: $fU\r\n");

    # STEP 16: Record route so in-dialog requests can come back through Kamailio.
    record_route();
    xlog("L_INFO", "RELAY in_proto=$proto out_transport=tcp callid=$ci dst=$ru\n");

    # STEP 17: Enable reply logging and relay the INVITE.
    t_on_reply("REPLY_LOG");

    if(!t_relay()) {
        sl_send_reply("500","Relay Failed");
    }
    exit;
}

# Logs every SIP reply (for example 100/180/200/4xx/5xx responses).
onreply_route[REPLY_LOG] {
    xlog("L_INFO", "REPLY proto=$proto code=$rs reason=$rr callid=$ci src=$si:$sp\n");
    xlog("L_INFO", "REPLY_HDR callid=$ci code=$rs contact=[$hdr(Contact)] record_route=[$hdr(Record-Route)] route=[$hdr(Route)] to=[$hdr(To)] from=[$hdr(From)]\n");
}

# Optional auth route for DIDWW inbound INVITE.
route[DIDWW_AUTH] {
    # STEP A1: Challenge INVITE if credentials are missing/wrong.
    # Challenge inbound INVITE and verify digest credentials from DIDWW.
    if (!pv_proxy_authenticate("$var(auth_realm)", "$var(auth_pass)", "0")) {
        xlog("L_WARN", "AUTH_CHALLENGE callid=$ci method=$rm src=$si:$sp from=[$fu]\n");
        proxy_challenge("$var(auth_realm)", "1");
        exit;
    }

    # STEP A2: Optional username check (extra safety).
    # Username extracted by auth module from digest credentials.
    $var(auth_user) = $au;
    $var(expected_auth_user) = $env(DIDWW_AUTH_USER);
    if ($var(expected_auth_user) != "" && $var(auth_user) != $var(expected_auth_user)) {
        xlog("L_WARN", "AUTH_USER_MISMATCH callid=$ci got=[$var(auth_user)] expected=[$var(expected_auth_user)]\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # STEP A3: Auth successful, continue normal flow.
    consume_credentials();
    xlog("L_INFO", "AUTH_OK callid=$ci auth_user=[$var(auth_user)] from=[$fu] src=$si:$sp\n");
}

# Optional enrichment route:
# calls an HTTP webhook and adds clinic headers to SIP request.
route[CLINIC_ENRICH] {
    # STEP E1: Start with default values.
    $var(clinic_id) = DEFAULT_CLINIC_ID;
    $var(clinic_name) = DEFAULT_CLINIC_NAME;

    # STEP E2: Build JSON payload sent to your webhook.
    $var(payload) = "{}";
    jansson_set("string", "clinic_id", "$var(clinic_id)", "$var(payload)");
    jansson_set("string", "clinic_name", "$var(clinic_name)", "$var(payload)");
    jansson_set("string", "call_id", "$ci", "$var(payload)");
    jansson_set("string", "from_user", "$fU", "$var(payload)");
    jansson_set("string", "to_user", "$rU", "$var(payload)");
    xlog("L_INFO", "WEBHOOK_REQUEST callid=$ci payload=$var(payload)\n");

    $var(webhook_body) = "";
    $var(http_rc) = http_client_query(WEBHOOK_URL, "$var(payload)", "Content-Type: application/json", "$var(webhook_body)");
    xlog("L_INFO", "WEBHOOK_RESPONSE callid=$ci http=$var(http_rc) body=$var(webhook_body)\n");

    # STEP E3: If webhook returns valid clinic data, overwrite defaults.
    if ($var(http_rc) >= 200 && $var(http_rc) < 300 && $var(webhook_body) != "") {
        $var(api_clinic_id) = "";
        $var(api_clinic_name) = "";

        if (jansson_get("clinic_id", "$var(webhook_body)", "$var(api_clinic_id)") && $var(api_clinic_id) != "") {
            $var(clinic_id) = $var(api_clinic_id);
        }

        if (jansson_get("clinic_name", "$var(webhook_body)", "$var(api_clinic_name)") && $var(api_clinic_name) != "") {
            $var(clinic_name) = $var(api_clinic_name);
        }
    }

    # STEP E4: Add clinic info as SIP headers for downstream systems.
    append_hf("X-clinic-id: $var(clinic_id)\r\n");
    append_hf("X-clinic-name: $var(clinic_name)\r\n");
}
